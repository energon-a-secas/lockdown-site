<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lockdown — Site Security Scanner</title>
  <meta name="description" content="Scan websites for exposed endpoints, missing headers, open files, and SEO gaps. Get a downloadable report with hardening tips">
  <meta property="og:title" content="Lockdown — Site Security Scanner">
  <meta property="og:description" content="Scan any site for security gaps, exposed files, and missing basics">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lockdown.neorgon.com/">
  <meta property="og:site_name" content="Neorgon">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Lockdown — Site Security Scanner">
  <meta name="twitter:description" content="Scan any site for security gaps, exposed files, and missing basics">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://lockdown.neorgon.com/">
  <meta property="og:locale" content="en_US">
  <meta name="theme-color" content="#040714">
  <!-- og:image: uncomment when social preview image is ready (1200x630 PNG)
  <meta property="og:image" content="https://lockdown.neorgon.com/og-preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630"> -->
  <link rel="icon" type="image/x-icon" href="https://pub-b597cd281a384f98a47e1f043a6c4160.r2.dev/v1.0.0/favicon.ico" />
  <link rel="stylesheet" href="css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Lockdown",
    "description": "Scan websites for exposed endpoints, missing headers, open files, and SEO gaps. Get actionable hardening tips.",
    "url": "https://lockdown.neorgon.com/",
    "applicationCategory": "SecurityApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "author": { "@type": "Organization", "name": "Neorgon", "url": "https://neorgon.com/" }
  }
  </script>
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header class="header-bar">
    <div class="header-logo">
      <a href="https://neorgon.com/" target="_blank" rel="noopener noreferrer">
        <img src="https://pub-b597cd281a384f98a47e1f043a6c4160.r2.dev/v1.0.0/energon-classic-logo.png" class="header-logo-img" alt="Logo">
      </a>
      <a href="./" class="header-title-link">
        <h1>Lockdown</h1>
        <div class="header-subtitle">Site Security Scanner</div>
      </a>
    </div>
    <a class="header-home" href="https://neorgon.com/" title="neorgon.com" aria-label="Neorgon home">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </a>
  </header>

  <main id="main">
    <div class="container">

      <!-- Password gate -->
      <div class="card gate-card" id="gateCard">
        <div class="gate-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <p class="gate-text">Enter the access password to start scanning</p>
        <div class="gate-form">
          <input type="password" id="gatePassword" placeholder="Password" autocomplete="off">
          <button class="btn btn-primary" id="gateSubmit">Unlock</button>
        </div>
        <div class="gate-error" id="gateError"></div>
      </div>

      <!-- Scanner (hidden until authenticated) -->
      <div id="scannerView" hidden>

        <!-- URL input -->
        <div class="card scan-input-card">
          <label class="input-label" for="targetUrl">Target URL</label>
          <div class="url-row">
            <input type="url" id="targetUrl" placeholder="https://example.com" autocomplete="url">
            <button class="btn btn-primary" id="scanBtn">
              <span id="scanBtnText">Scan</span>
              <span id="scanBtnSpinner" class="spinner" hidden></span>
            </button>
          </div>
          <div class="scan-error" id="scanError"></div>
          <details class="fuzz-paths-toggle">
            <summary>Custom fuzz paths (optional)</summary>
            <label class="input-label" for="fuzzPaths" style="margin-top:var(--space-3)">Base paths to fuzz</label>
            <input type="text" id="fuzzPaths" placeholder="/api, /api/v1, /api/v2, /graphql" autocomplete="off">
            <p class="fuzz-hint">Comma-separated base paths. Defaults to /api, /api/v1, /api/v2 if empty.</p>
          </details>
        </div>

        <!-- Progress -->
        <div class="card progress-card" id="progressCard" hidden>
          <div class="progress-header">
            <span class="progress-label" id="progressLabel">Starting scan...</span>
            <span class="progress-pct" id="progressPct">0%</span>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
        </div>

        <!-- Results -->
        <div id="resultsView" hidden>
          <div class="results-header">
            <div class="results-summary">
              <span class="score-badge" id="scoreBadge"></span>
              <span class="results-url" id="resultsUrl"></span>
            </div>
            <button class="btn btn-secondary" id="downloadBtn">Download Report</button>
          </div>

          <div class="category-tabs" id="categoryTabs"></div>
          <div id="findingsContainer"></div>
          <div id="networkLog"></div>
        </div>

      </div>
    </div>
  </main>

  <footer class="info-footer">
    Part of <a class="footer-link" href="https://neorgon.com/">Neorgon</a>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
